{
    "extractor": {
        "base-directory": "media-downloads",
        "archive": null,
		
		"instagram": {
			"videos": "ytdl",
			"ytdl" : {
				"format": "avc1"
			},
			"ytdl-args" : [
				"-f", "bv[ext=mp4][vcodec^=avc]+ba[ext=m4a]/b[ext=mp4]"
			],
			"postprocessors": [
                {
                    "name": "metadata",
                    "extension": "txt",
                    "content": "{content|description|caption}"
                }
            ]
        },

		"tiktok": {
			"videos": "ytdl",
			"postprocessors": [
                {
                    "name": "metadata",
                    "extension": "txt",
                    "content": "{description|caption}"
                }
            ]
        }
    }
}